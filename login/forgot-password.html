<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB-Controller - Forgot Password</title>
    <link rel="stylesheet" href="../login/login.css">
    <style>
        .subtitle { text-align: center; color: #718096; font-size: 14px; margin-top: -16px; margin-bottom: 28px; line-height: 1.6; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #667eea; font-size: 14px; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: #764ba2; text-decoration: underline; }
        .success-state { display: none; text-align: center; padding: 16px 0; }
        .success-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .success-icon svg { width: 32px; height: 32px; stroke: white; }
        .success-state h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 10px; }
        .success-state p { color: #718096; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .lang-switcher { position: fixed; top: 20px; right: 24px; z-index: 1000; }
        .lang-btn { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 8px 14px; color: white; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .lang-btn:hover { background: rgba(255,255,255,0.3); }
        .lang-btn svg { width: 16px; height: 16px; }
        .lang-dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: white; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); overflow: hidden; min-width: 140px; }
        .lang-switcher.open .lang-dropdown { display: block; }
        .lang-option { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 14px; color: #374151; cursor: pointer; transition: background 0.15s; }
        .lang-option:hover { background: #f3f4f6; }
        .lang-option.active { background: #ede9fe; color: #667eea; font-weight: 600; }
        .lang-flag { font-size: 18px; }
    </style>
</head>
<body>

<div class="lang-switcher" id="langSwitcher">
    <button class="lang-btn" onclick="toggleLangDropdown()">
        <span id="currentFlag">🇺🇸</span>
        <span id="currentLang">EN</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </button>
    <div class="lang-dropdown">
        <div class="lang-option" onclick="selectLang('en')"><span class="lang-flag">🇺🇸</span> English</div>
        <div class="lang-option" onclick="selectLang('ru')"><span class="lang-flag">🇷🇺</span> Русский</div>
        <div class="lang-option" onclick="selectLang('uz')"><span class="lang-flag">🇺🇿</span> O'zbekcha</div>
    </div>
</div>

<div class="login-container">
    <div class="login-card">
        <h1>DB-Controller</h1>

        <div id="formState">
            <p class="subtitle" id="fpSubtitle">Enter your email and we'll send you a link to reset your password.</p>
            <div class="form-group">
                <label id="fpEmailLabel">Email Address</label>
                <input type="email" id="emailInput" placeholder="your@email.com">
            </div>
            <button class="login-btn" id="submitBtn" onclick="submitForgotPassword()">Send Reset Link</button>
            <a href="../login" class="back-link" id="fpBackLink">← Back to Login</a>
        </div>

        <div class="success-state" id="successState">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 id="fpSuccessTitle">Check your inbox</h2>
            <p id="fpSuccessMessage">If an account with that email exists, we've sent a password reset link. It expires in 15 minutes.</p>
            <a href="../login" class="back-link" id="fpSuccessBackLink">← Back to Login</a>
        </div>
    </div>
</div>

<script src="../scripts/i18n.js"></script>
<script src="../login/forgot-password.js"></script>
<script>
    const langMeta = { en: { flag: '🇺🇸', label: 'EN' }, ru: { flag: '🇷🇺', label: 'RU' }, uz: { flag: '🇺🇿', label: 'UZ' } };

    function applyTranslations() {
        if (!window.i18n) return;
        const t = (key) => window.i18n.t(key);
        document.getElementById('fpSubtitle').textContent        = t('forgotPassword.subtitle');
        document.getElementById('fpEmailLabel').textContent      = t('forgotPassword.emailLabel');
        document.getElementById('emailInput').placeholder        = t('forgotPassword.emailPlaceholder');
        document.getElementById('submitBtn').textContent         = t('forgotPassword.submitBtn');
        document.getElementById('fpBackLink').textContent        = t('forgotPassword.backToLogin');
        document.getElementById('fpSuccessTitle').textContent    = t('forgotPassword.successTitle');
        document.getElementById('fpSuccessMessage').textContent  = t('forgotPassword.successMessage');
        document.getElementById('fpSuccessBackLink').textContent = t('forgotPassword.backToLogin');
    }

    function initLang() {
        const stored = localStorage.getItem('preferredLanguage') || 'en';
        if (window.i18n) window.i18n.currentLang = stored; // ← THIS LINE IS MISSING
        document.getElementById('currentFlag').textContent = langMeta[stored]?.flag || '🇺🇸';
        document.getElementById('currentLang').textContent = langMeta[stored]?.label || 'EN';
        document.querySelectorAll('.lang-option').forEach((opt, i) => {
            opt.classList.toggle('active', ['en','ru','uz'][i] === stored);
        });
        applyTranslations();
    }

    function toggleLangDropdown() { document.getElementById('langSwitcher').classList.toggle('open'); }

    function selectLang(lang) {
        localStorage.setItem('preferredLanguage', lang);
        if (window.i18n) window.i18n.setLanguage(lang);
        document.getElementById('langSwitcher').classList.remove('open');
        initLang();
    }

    document.addEventListener('click', (e) => {
        if (!document.getElementById('langSwitcher').contains(e.target))
            document.getElementById('langSwitcher').classList.remove('open');
    });

    document.addEventListener('DOMContentLoaded', initLang);
    window.addEventListener('languageChanged', applyTranslations);
</script>
</body>
</html>
