<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="../admin/css/common.css">
    <link rel="stylesheet" href="../admin/css/endpoints.css">
    <link rel="stylesheet" href="../admin/css/active-users.css">
    <link rel="stylesheet" href="../admin/css/org-activity.css">
    <link rel="stylesheet" href="../admin/css/agent-versions.css">
</head>
<body>
<div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Admin Panel</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-section="endpoints">
                <span class="nav-icon">📊</span>
                <span>Endpoints</span>
            </a>
            <a href="#" class="nav-item" data-section="active-users">
                <span class="nav-icon">👥</span>
                <span>Active Users</span>
            </a>
            <a href="#" class="nav-item" data-section="org-activity">
                <span class="nav-icon">🏢</span>
                <span>Organization Activity</span>
            </a>
            <a href="#" class="nav-item" data-section="agent-versions">
                <span class="nav-icon">🤖</span>
                <span>Agent Versions</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content Area (dynamically changed) -->
    <main class="main-content" id="mainContent">
        <!-- Content will be loaded here by JavaScript -->
    </main>
</div>

<!-- Load scripts -->
<script src="../scripts/token-refresh.js"></script>
<script src="../admin/js/main.js"></script>
<script src="../admin/js/endpoints.js"></script>
<script src="../admin/js/active-users.js"></script>
