<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB-Controller - Forgot Password</title>
    <link rel="stylesheet" href="../login/login.css">
    <style>
        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-top: -16px;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Success state */
        .success-state {
            display: none;
            text-align: center;
            padding: 16px 0;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
            stroke: white;
        }

        .success-state h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .success-state p {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1>DB-Controller</h1>

        <!-- Form State -->
        <div id="formState">
            <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" placeholder="your@email.com">
            </div>

            <button class="login-btn" id="submitBtn" onclick="submitForgotPassword()">
                Send Reset Link
            </button>

            <a href="../login/" class="back-link">← Back to Login</a>
        </div>

        <!-- Success State (shown after submit) -->
        <div class="success-state" id="successState">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h2>Check your inbox</h2>
            <p>If an account with that email exists, we've sent a password reset link. It expires in 15 minutes.</p>
            <a href="../login/" class="back-link">← Back to Login</a>
        </div>
    </div>
</div>

<script src="../login/forgot-password.js"></script>
</body>
</html>
